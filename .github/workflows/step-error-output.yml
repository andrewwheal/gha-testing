name: Output from erroring Step

on:
  push:
  workflow_dispatch:

jobs:
  step-error-output:
    runs-on: ubuntu-latest
    steps:
      - id: output
        continue-on-error: true
        uses: ./.github/actions/step-error-output@step-error-output
        with:
          should_error: yes
      - id: use
        run: |
          echo "${{steps.output.outputs.out || 'nope'}}"
  step-output:
    runs-on: ubuntu-latest
    steps:
      - id: output
        continue-on-error: true
        uses: ./github/actions/step-error-output@step-error-output
      - id: use
        run: |
          echo "${{steps.output.outputs.out || 'nope'}}"
