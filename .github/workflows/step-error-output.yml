name: Output from erroring Step

on:
  push:
  workflow_dispatch:

jobs:
  step-error-output:
    runs-on: ubuntu-latest
    steps:
      - id: output
        continue-on-error: true
        run: |
          exit 1
          echo "out=1" >>"$GITHUB_OUTPUT"
      - id: use
        run: |
          echo "${{steps.output.outputs.out || 'nope'}}"
  step-output:
    runs-on: ubuntu-latest
    steps:
      - id: output
        continue-on-error: true
        run: |
          echo "out=1" >>"$GITHUB_OUTPUT"
      - id: use
        run: |
          echo "${{steps.output.outputs.out || 'nope'}}"
